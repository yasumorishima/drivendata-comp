name: DrivenData TPU Train (Kaggle)

on:
  workflow_dispatch:
    inputs:
      competition_dir:
        description: "Competition directory (e.g. pasketti-phonetic)"
        required: true
        type: string
      model_release_tag:
        description: "GitHub Release tag for model weights (e.g. phonetic-tpu-v1)"
        required: true
        type: string
      memo:
        description: "Experiment description (required)"
        required: true
        type: string
      model_name:
        description: "Base model (default: from config)"
        required: false
        type: string
      epochs:
        description: "Training epochs (default: 20)"
        required: false
        type: string
        default: "20"
      batch_size:
        description: "Batch size per device (default: 4)"
        required: false
        type: string
        default: "4"
      gradient_accumulation:
        description: "Gradient accumulation steps (default: 16)"
        required: false
        type: string
        default: "16"
      learning_rate:
        description: "Learning rate (default: 5e-5)"
        required: false
        type: string
        default: "5e-5"

jobs:
  train:
    name: Train on Kaggle TPU
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install kaggle wandb

      - name: Preflight check
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          COMP_DIR="${{ inputs.competition_dir }}"
          ERRORS=0

          # 1. Syntax check of train script
          echo "=== 1. Syntax check ==="
          if [ -f "$COMP_DIR/train.py" ]; then
            python3 -c "import py_compile; py_compile.compile('$COMP_DIR/train.py', doraise=True)" || { echo "FAIL: train.py syntax error"; ERRORS=$((ERRORS+1)); }
          else
            echo "FAIL: $COMP_DIR/train.py not found"
            ERRORS=$((ERRORS+1))
          fi

          # 2. Secrets check
          echo "=== 2. Secrets check ==="
          for VAR in KAGGLE_USERNAME KAGGLE_KEY; do
            if [ -z "${!VAR}" ]; then
              echo "FAIL: $VAR not set"
              ERRORS=$((ERRORS+1))
            fi
          done
          [ $ERRORS -eq 0 ] && echo "OK: All secrets present"

          # 3. Kaggle auth test
          echo "=== 3. Kaggle auth test ==="
          mkdir -p ~/.kaggle
          echo "{\"username\":\"$KAGGLE_USERNAME\",\"key\":\"$KAGGLE_KEY\"}" > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json
          kaggle kernels list --mine --page-size 1 > /dev/null 2>&1 || { echo "FAIL: Kaggle auth"; ERRORS=$((ERRORS+1)); }
          echo "OK: Kaggle auth works"

          # 4. Kernel ID slug check
          echo "=== 4. Kernel ID slug check ==="
          if [ -f "$COMP_DIR/kernel-metadata.json" ]; then
            KID=$(python3 -c "import json; print(json.load(open('$COMP_DIR/kernel-metadata.json')).get('id',''))")
            KTITLE=$(python3 -c "import json; print(json.load(open('$COMP_DIR/kernel-metadata.json')).get('title',''))")
            echo "Kernel ID: $KID, Title: $KTITLE"
            if [ -z "$KID" ]; then
              echo "FAIL: Kernel ID is empty"
              ERRORS=$((ERRORS+1))
            fi
          else
            echo "FAIL: kernel-metadata.json not found"
            ERRORS=$((ERRORS+1))
          fi

          echo "=== Preflight: $ERRORS errors ==="
          if [ $ERRORS -gt 0 ]; then exit 1; fi

      - name: Dry-run smoke test (CPU)
        run: |
          cd ${{ inputs.competition_dir }}
          pip install -q torch transformers librosa soundfile jiwer numpy
          python train.py --dry_run
          echo "Smoke test passed"
        timeout-minutes: 5

      - name: Read competition config
        id: config
        run: |
          CONFIG="${{ inputs.competition_dir }}/drivendata-config.json"
          ARTIFACT_NAME=$(python3 -c "import json; print(json.load(open('$CONFIG')).get('artifact_name',''))")
          BASE_MODEL=$(python3 -c "import json; print(json.load(open('$CONFIG')).get('base_model',''))")
          KERNEL_ID=$(python3 -c "import json; print(json.load(open('${{ inputs.competition_dir }}/kernel-metadata.json')).get('id',''))")

          MODEL_NAME="${{ inputs.model_name }}"
          if [ -z "$MODEL_NAME" ]; then
            MODEL_NAME="$BASE_MODEL"
          fi

          echo "artifact_name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
          echo "model_name=$MODEL_NAME" >> "$GITHUB_OUTPUT"
          echo "kernel_id=$KERNEL_ID" >> "$GITHUB_OUTPUT"

      - name: Generate training notebook
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          RUN_MEMO: ${{ inputs.memo }}
          MODEL_NAME: ${{ steps.config.outputs.model_name }}
          EPOCHS: ${{ inputs.epochs }}
          BATCH_SIZE: ${{ inputs.batch_size }}
          LEARNING_RATE: ${{ inputs.learning_rate }}
          GRADIENT_ACCUMULATION: ${{ inputs.gradient_accumulation }}
          ARTIFACT_NAME: ${{ steps.config.outputs.artifact_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          cd "${{ inputs.competition_dir }}"
          python generate_notebook.py

      - name: Switch kernel to TPU mode
        run: |
          METADATA="${{ inputs.competition_dir }}/kernel-metadata.json"
          python3 -c "
          import json
          with open('$METADATA') as f:
              meta = json.load(f)
          meta['enable_gpu'] = 'false'
          meta['enable_tpu'] = 'true'
          with open('$METADATA', 'w') as f:
              json.dump(meta, f, indent=2)
          print('Switched to TPU: enable_gpu=false, enable_tpu=true')
          "

      - name: Inject TPU compatibility cell into notebook
        run: |
          NOTEBOOK="${{ inputs.competition_dir }}/train_kaggle.ipynb"
          python3 << 'PYEOF'
          import json

          with open("${{ inputs.competition_dir }}/train_kaggle.ipynb") as f:
              nb = json.load(f)

          # TPU strategy: Kaggle TPU has torch+torch_xla pre-installed.
          # pip install transformers/accelerate can break torch compatibility.
          # Solution:
          # 1. Remove transformers/accelerate from pip install cell (keep other deps)
          # 2. In TPU cell, install transformers+accelerate with --no-deps (don't touch torch)
          # 3. Install only missing sub-deps (safetensors, tokenizers, huggingface-hub)
          tpu_cell = {
              "cell_type": "code",
              "metadata": {},
              "source": [
                  "# TPU Setup — force install compatible transformers, clear module cache\n",
                  "import subprocess, sys\n",
                  "\n",
                  "# Kaggle TPU env issues:\n",
                  "#   transformers 4.57+ → keras_nlp backend bug\n",
                  "#   tokenizers 0.22.2 → incompatible with transformers 4.51\n",
                  "#   datasets 2.14.4 + pyarrow 18+ → no PyExtensionType\n",
                  "# Fix: downgrade transformers/tokenizers (--no-deps to protect torch),\n",
                  "#       upgrade datasets (normal install, won't touch torch)\n",
                  "subprocess.run([sys.executable, '-m', 'pip', 'install', '-q',\n",
                  "    'transformers==4.51.3', 'accelerate==1.6.0', 'tokenizers==0.21.0',\n",
                  "    '--force-reinstall', '--no-deps'],\n",
                  "    check=True)\n",
                  "subprocess.run([sys.executable, '-m', 'pip', 'install', '-q',\n",
                  "    'datasets>=3.0'],\n",
                  "    check=True)\n",
                  "\n",
                  "# Clear any cached failed imports from the old version\n",
                  "import importlib\n",
                  "mods_to_clear = [k for k in sys.modules if k.startswith('transformers')]\n",
                  "for m in mods_to_clear:\n",
                  "    del sys.modules[m]\n",
                  "importlib.invalidate_caches()\n",
                  "\n",
                  "import torch\n",
                  "import torch_xla\n",
                  "import torch_xla.core.xla_model as xm\n",
                  "from transformers import Wav2Vec2ForCTC\n",
                  "print(f'torch: {torch.__version__}')\n",
                  "print(f'torch_xla: {torch_xla.__version__}')\n",
                  "print(f'TPU device: {xm.xla_device()}')\n",
                  "print(f'transformers import: OK')\n",
                  "\n",
                  "import os\n",
                  "os.environ['XLA_USE_BF16'] = '1'\n",
                  "os.environ['PJRT_DEVICE'] = 'TPU'\n",
                  "print('TPU configured for bf16 training')\n",
              ],
              "execution_count": None,
              "outputs": [],
          }

          # Find pip install cell and strip transformers-related packages
          # (they'll be installed in the TPU cell with --no-deps instead)
          for i, cell in enumerate(nb["cells"]):
              if cell["cell_type"] == "code":
                  src = "".join(cell["source"]) if isinstance(cell["source"], list) else cell["source"]
                  if "transformers" in src and "pip install" in src:
                      # Remove transformers[torch] from pip install, keep other deps
                      new_src = src.replace("transformers[torch] ", "").replace("transformers ", "")
                      cell["source"] = [new_src]
                      print(f"Stripped transformers from pip install cell {i}")
                      break

          # Insert TPU cell after pip install cell (2nd code cell)
          code_count = 0
          insert_idx = 1
          for i, cell in enumerate(nb["cells"]):
              if cell["cell_type"] == "code":
                  code_count += 1
                  if code_count == 2:
                      insert_idx = i + 1
                      break

          # Auto-disable gradient checkpointing on TPU
          # torch.utils.checkpoint calls getattr(torch, "xla") which crashes on TPU.
          # Monkey-patch Module.to() so any model moved to TPU device gets it disabled.
          gc_patch_cell = {
              "cell_type": "code",
              "metadata": {},
              "source": [
                  "# TPU fix: auto-disable gradient checkpointing\n",
                  "# torch.utils.checkpoint uses getattr(torch, 'xla') which crashes on TPU\n",
                  "import torch\n",
                  "_orig_to = torch.nn.Module.to\n",
                  "def _patched_to(self, *args, **kwargs):\n",
                  "    result = _orig_to(self, *args, **kwargs)\n",
                  "    if hasattr(result, 'gradient_checkpointing_disable'):\n",
                  "        result.gradient_checkpointing_disable()\n",
                  "    return result\n",
                  "torch.nn.Module.to = _patched_to\n",
                  "print('TPU: auto gradient_checkpointing_disable() patch applied')\n",
              ],
              "execution_count": None,
              "outputs": [],
          }

          nb["cells"].insert(insert_idx, tpu_cell)
          nb["cells"].insert(insert_idx + 1, gc_patch_cell)

          with open("${{ inputs.competition_dir }}/train_kaggle.ipynb", "w") as f:
              json.dump(nb, f, indent=1, ensure_ascii=False)

          print(f"Injected TPU setup + gradient_checkpointing patch at position {insert_idx}")
          PYEOF

      - name: Setup Kaggle credentials
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          mkdir -p ~/.kaggle
          echo "{\"username\":\"$KAGGLE_USERNAME\",\"key\":\"$KAGGLE_KEY\"}" > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json
          kaggle kernels list --mine --page-size 1 || { echo "ERROR: Kaggle auth failed"; exit 1; }

      - name: Push and poll
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          KERNEL_ID="${{ steps.config.outputs.kernel_id }}"
          NB_DIR="${{ inputs.competition_dir }}"

          check_status() {
            python3 -c "
          from kaggle.api.kaggle_api_extended import KaggleApi
          import json
          api = KaggleApi()
          api.authenticate()
          try:
              result = api.kernels_status('$KERNEL_ID')
              if isinstance(result, str):
                  data = json.loads(result)
              elif hasattr(result, '__dict__'):
                  data = json.loads(str(result))
              else:
                  data = {'status': str(result)}
              status = data.get('status', 'UNKNOWN')
              fail_msg = data.get('failureMessage', '')
              if fail_msg:
                  print(f'{status}|{fail_msg}')
              else:
                  print(status)
          except Exception as e:
              print(f'CHECK_ERROR: {e}')
          " 2>&1
          }

          # Wait for any existing run to finish
          for i in $(seq 1 20); do
            RAW=$(check_status)
            echo "Pre-push check $i/20: $RAW"
            if echo "$RAW" | grep -qiE "COMPLETE|ERROR|CANCEL|CHECK_ERROR"; then
              break
            fi
            sleep 30
          done

          echo "=== Pushing TPU kernel ==="
          PUSH_OUTPUT=$(kaggle kernels push -p "$NB_DIR" 2>&1) || true
          echo "Push output: $PUSH_OUTPUT"

          if echo "$PUSH_OUTPUT" | grep -qiE "quota.*reached|TPU quota|session count"; then
            echo "TPU quota exhausted."
            curl -s -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d '{"content": "❌ **TPU枠切れ** — Kaggle TPU quota exhausted.\nKernel: `'"$KERNEL_ID"'`"}' || true
            exit 1
          fi

          # Wait for startup
          echo "Waiting 120s for Kaggle to initialize..."
          sleep 120

          STARTED=false
          for i in $(seq 1 60); do
            RAW=$(check_status)
            if [ $((i % 5)) -eq 0 ]; then
              echo "Startup check $i/60: $RAW"
            fi
            if echo "$RAW" | grep -qiE "RUNNING|QUEUED"; then
              echo "Kernel started: $RAW"
              STARTED=true
              break
            fi
            if echo "$RAW" | grep -q "^COMPLETE$"; then
              echo "Kernel completed."
              STARTED=true
              break
            fi
            sleep 30
          done

          if [ "$STARTED" = "false" ]; then
            echo "Kernel never started."
            exit 1
          fi

          # Poll for completion (up to 6 hours)
          for i in $(seq 1 720); do
            RAW=$(check_status)
            if [ $((i % 10)) -eq 0 ]; then
              echo "Poll $i/720: $RAW"
            fi
            if echo "$RAW" | grep -qiE "COMPLETE_EMPTY|ERROR|CANCEL"; then
              echo "Kernel failed: $RAW"
              exit 1
            fi
            if echo "$RAW" | grep -qiE "COMPLETE"; then
              echo "Kernel completed successfully."
              break
            fi
            sleep 30
          done

      - name: Restore kernel settings
        if: always()
        run: |
          METADATA="${{ inputs.competition_dir }}/kernel-metadata.json"
          python3 -c "
          import json
          with open('$METADATA') as f:
              meta = json.load(f)
          meta['enable_gpu'] = 'true'
          meta['enable_tpu'] = 'false'
          with open('$METADATA', 'w') as f:
              json.dump(meta, f, indent=2)
          "

      - name: Show kernel diagnostics on failure
        if: failure()
        run: |
          KERNEL_ID="${{ steps.config.outputs.kernel_id }}"
          SLUG=$(echo "$KERNEL_ID" | cut -d'/' -f2)
          mkdir -p ./kernel_log_out
          kaggle kernels output "$KERNEL_ID" -p ./kernel_log_out || true
          LOG_FILE="./kernel_log_out/${SLUG}.log"
          if [ -f "$LOG_FILE" ]; then
            echo "--- stdout (last 50 lines) ---"
            python3 -c "import json; entries=json.load(open('$LOG_FILE')); lines=[e['data'] for e in entries if e.get('stream_name')=='stdout']; print(''.join(lines[-50:]),end='')" || true
            echo ""
            echo "--- stderr (first 50 lines) ---"
            python3 -c "import json; entries=json.load(open('$LOG_FILE')); errs=[e['data'] for e in entries if e.get('stream_name')=='stderr']; print(''.join(errs[:50]),end='')" || true
            echo ""
            echo "--- stderr (last 80 lines) ---"
            python3 -c "import json; entries=json.load(open('$LOG_FILE')); errs=[e['data'] for e in entries if e.get('stream_name')=='stderr']; print(''.join(errs[-80:]),end='')" || true
          else
            echo "No log file found."
          fi

      - name: Download kernel output
        run: |
          KERNEL_ID="${{ steps.config.outputs.kernel_id }}"
          mkdir -p ./kaggle_output
          kaggle kernels output "$KERNEL_ID" -p ./kaggle_output
          echo "Downloaded files:"
          find ./kaggle_output -type f -exec ls -lh {} \;

      - name: Create GitHub Release with model
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ inputs.model_release_tag }}"
          MODEL_TAR=$(find ./kaggle_output -name "model_*.tar.gz" | head -1)

          if [ -z "$MODEL_TAR" ]; then
            echo "ERROR: No model tar.gz found"
            find ./kaggle_output -type f
            exit 1
          fi

          SIZE=$(du -h "$MODEL_TAR" | cut -f1)
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" "$MODEL_TAR" \
            --title "$TAG" \
            --notes "**${{ inputs.memo }}**

          - Accelerator: **TPU v3-8**
          - Competition: ${{ inputs.competition_dir }}
          - Model: ${{ steps.config.outputs.model_name }}
          - Epochs: ${{ inputs.epochs }}
          - LR: ${{ inputs.learning_rate }}
          - Size: $SIZE
          - Workflow: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Sync W&B offline runs
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
        run: |
          WANDB_DIRS=$(find ./kaggle_output -type d -name "offline-run-*" 2>/dev/null)
          if [ -z "$WANDB_DIRS" ]; then
            echo "No W&B offline runs found."
          else
            for dir in $WANDB_DIRS; do
              echo "Syncing: $dir"
              wandb sync "$dir" || true
            done
          fi

      - name: Notify Discord (success)
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"✅ **TPU学習完了**\nDir: \`${{ inputs.competition_dir }}\`\nModel: \`${{ inputs.model_release_tag }}\`\nAccelerator: TPU v3-8\nMemo: ${{ inputs.memo }}\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true

      - name: Notify Discord (failure)
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"❌ **TPU学習失敗**\nDir: \`${{ inputs.competition_dir }}\`\nMemo: ${{ inputs.memo }}\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true
