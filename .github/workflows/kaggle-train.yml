name: DrivenData GPU Train (Kaggle)

on:
  workflow_dispatch:
    inputs:
      competition_dir:
        description: "Competition directory (e.g. pasketti-phonetic)"
        required: true
        type: string
      model_release_tag:
        description: "GitHub Release tag for model weights (e.g. phonetic-model-v1)"
        required: true
        type: string
      memo:
        description: "Experiment description (required)"
        required: true
        type: string
      model_name:
        description: "Base model (default: from config)"
        required: false
        type: string
      epochs:
        description: "Training epochs (default: 20)"
        required: false
        type: string
        default: "20"
      batch_size:
        description: "Batch size (default: 8, auto-reduced by train.py if VRAM insufficient)"
        required: false
        type: string
        default: "8"
      learning_rate:
        description: "Learning rate (default: 5e-5)"
        required: false
        type: string
        default: "5e-5"
      export_only:
        description: "Export pretrained model without training (default: false)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  train:
    name: Train on Kaggle GPU
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install kaggle wandb

      - name: Preflight check
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          COMP_DIR="${{ inputs.competition_dir }}"

          # Secrets check (CI-only, not in preflight.py)
          ERRORS=0
          for VAR in KAGGLE_USERNAME KAGGLE_KEY GH_PAT; do
            if [ -z "${!VAR}" ]; then
              echo "FAIL: $VAR not set"
              ERRORS=$((ERRORS+1))
            fi
          done
          if [ $ERRORS -gt 0 ]; then exit 1; fi
          echo "OK: All secrets present"

          # Setup Kaggle credentials for preflight.py
          mkdir -p ~/.kaggle
          echo "{\"username\":\"$KAGGLE_USERNAME\",\"key\":\"$KAGGLE_KEY\"}" > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

          # Run shared preflight script (same as local)
          python3 scripts/preflight.py "$COMP_DIR"

          # Extract kernel existence for downstream steps
          KID=$(python3 -c "import json; print(json.load(open('$COMP_DIR/kernel-metadata.json')).get('id',''))")
          KERNEL_EXISTS=$(python3 -c "
          from kaggle.api.kaggle_api_extended import KaggleApi
          api = KaggleApi(); api.authenticate()
          try:
              api.kernels_status('$KID'); print('yes')
          except Exception:
              print('no')
          " 2>&1)
          echo "KERNEL_EXISTS=$KERNEL_EXISTS" >> "$GITHUB_ENV"

      - name: Dry-run smoke test (CPU)
        run: |
          cd ${{ inputs.competition_dir }}
          pip install -q torch transformers librosa soundfile jiwer numpy
          python train.py --dry_run
          echo "Smoke test passed"
        timeout-minutes: 5

      - name: Read competition config
        id: config
        run: |
          CONFIG="${{ inputs.competition_dir }}/drivendata-config.json"
          ARTIFACT_NAME=$(python3 -c "import json; print(json.load(open('$CONFIG')).get('artifact_name',''))")
          BASE_MODEL=$(python3 -c "import json; print(json.load(open('$CONFIG')).get('base_model',''))")
          KERNEL_ID=$(python3 -c "import json; print(json.load(open('${{ inputs.competition_dir }}/kernel-metadata.json')).get('id',''))")

          # Use input model_name if provided, otherwise config default
          MODEL_NAME="${{ inputs.model_name }}"
          if [ -z "$MODEL_NAME" ]; then
            MODEL_NAME="$BASE_MODEL"
          fi

          echo "artifact_name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
          echo "model_name=$MODEL_NAME" >> "$GITHUB_OUTPUT"
          echo "kernel_id=$KERNEL_ID" >> "$GITHUB_OUTPUT"
          echo "Config: artifact=$ARTIFACT_NAME model=$MODEL_NAME kernel=$KERNEL_ID"

      - name: Generate training notebook
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          RUN_MEMO: ${{ inputs.memo }}
          MODEL_NAME: ${{ steps.config.outputs.model_name }}
          EPOCHS: ${{ inputs.epochs }}
          BATCH_SIZE: ${{ inputs.batch_size }}
          LEARNING_RATE: ${{ inputs.learning_rate }}
          GRADIENT_ACCUMULATION: "8"
          ARTIFACT_NAME: ${{ steps.config.outputs.artifact_name }}
          GH_REPO: ${{ github.repository }}
          EXPORT_ONLY: ${{ inputs.export_only }}
        run: |
          cd "${{ inputs.competition_dir }}"
          python generate_notebook.py

      - name: Setup Kaggle credentials
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          mkdir -p ~/.kaggle
          echo "{\"username\":\"$KAGGLE_USERNAME\",\"key\":\"$KAGGLE_KEY\"}" > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json
          # Verify auth works
          kaggle kernels list --mine --page-size 1 || { echo "ERROR: Kaggle auth failed"; exit 1; }

      - name: Ensure kernel exists on Kaggle
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          export KERNEL_ID="${{ steps.config.outputs.kernel_id }}"
          export NB_DIR="${{ inputs.competition_dir }}"

          if [ "$KERNEL_EXISTS" = "yes" ]; then
            echo "Kernel '$KERNEL_ID' already exists. Skipping bootstrap."
            exit 0
          fi

          echo "Kernel '$KERNEL_ID' does not exist. Creating via REST API..."

          python3 -c "
          import json, os, sys, time, urllib.request, urllib.error, base64

          kernel_id = os.environ['KERNEL_ID']
          nb_dir = os.environ['NB_DIR']
          username = os.environ['KAGGLE_USERNAME']
          key = os.environ['KAGGLE_KEY']

          if not kernel_id or '/' not in kernel_id:
              print(f'ERROR: Invalid kernel ID: {kernel_id!r}')
              sys.exit(1)

          slug = kernel_id.split('/', 1)[1]

          nb_file = os.path.join(nb_dir, 'train_kaggle.ipynb')
          if not os.path.exists(nb_file):
              print(f'ERROR: Notebook not found: {nb_file}')
              sys.exit(1)

          with open(nb_file) as f:
              notebook_content = f.read()

          meta_file = os.path.join(nb_dir, 'kernel-metadata.json')
          with open(meta_file) as f:
              meta = json.load(f)

          payload = json.dumps({
              'newTitle': meta.get('title', slug),
              'text': notebook_content,
              'language': 'python',
              'kernelType': 'notebook',
              'isPrivate': True,
              'enableGpu': meta.get('enable_gpu', 'false') == 'true',
              'enableTpu': meta.get('enable_tpu', 'false') == 'true',
              'enableInternet': meta.get('enable_internet', 'false') == 'true',
              'datasetDataSources': [],
              'competitionDataSources': [],
              'kernelDataSources': [],
              'modelDataSources': [],
              'categoryIds': [],
          }).encode()

          auth = base64.b64encode(f'{username}:{key}'.encode()).decode()
          req = urllib.request.Request(
              'https://www.kaggle.com/api/v1/kernels/push',
              data=payload,
              headers={
                  'Content-Type': 'application/json',
                  'Authorization': f'Basic {auth}',
              },
              method='POST',
          )

          try:
              resp = urllib.request.urlopen(req)
              result = json.loads(resp.read().decode())
              print(f'Kernel created successfully: {result}')
          except urllib.error.HTTPError as e:
              body = e.read().decode()
              print(f'ERROR: Kernel creation failed (HTTP {e.code}): {body}')
              sys.exit(1)

          print('Waiting 60s for Kaggle to register kernel...')
          time.sleep(60)

          from kaggle.api.kaggle_api_extended import KaggleApi
          api = KaggleApi(); api.authenticate()
          try:
              api.kernels_status(kernel_id)
              print(f'Verified: kernel {kernel_id!r} now exists.')
          except Exception as e:
              print(f'ERROR: Kernel still not found after creation: {e}')
              sys.exit(1)
          "

      - name: Push and poll with GPU fallback
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          KERNEL_ID="${{ steps.config.outputs.kernel_id }}"
          NB_DIR="${{ inputs.competition_dir }}"
          METADATA="$NB_DIR/kernel-metadata.json"

          # Check kernel status via Python API
          check_status() {
            python3 -c "
          from kaggle.api.kaggle_api_extended import KaggleApi
          import json
          api = KaggleApi()
          api.authenticate()
          try:
              result = api.kernels_status('$KERNEL_ID')
              if isinstance(result, str):
                  data = json.loads(result)
              elif hasattr(result, 'status'):
                  data = {'status': result.status}
              else:
                  data = json.loads(str(result))
              print(data.get('status', 'UNKNOWN'))
          except Exception as e:
              print(f'CHECK_ERROR: {e}')
          " 2>&1
          }

          wait_for_idle() {
            for i in $(seq 1 20); do
              RAW=$(check_status)
              echo "Pre-push check $i/20: $RAW"
              # CHECK_ERROR with 404 = kernel doesn't exist yet (OK for first push)
              # CHECK_ERROR with other = real problem → abort
              if echo "$RAW" | grep -q "CHECK_ERROR"; then
                if echo "$RAW" | grep -qiE "404|Not Found"; then
                  echo "Kernel not found (expected for new kernels)."
                  return 0
                else
                  echo "ERROR: Unexpected API error: $RAW"
                  return 1
                fi
              fi
              if echo "$RAW" | grep -qiE "COMPLETE|ERROR|CANCEL"; then
                return 0
              fi
              echo "Kernel still running, waiting 30s..."
              sleep 30
            done
          }

          poll_until_done() {
            # Wait 2 min for Kaggle to register push before polling
            echo "Waiting 120s for Kaggle to initialize kernel..."
            sleep 120

            # After push, status may still show old result (ERROR/COMPLETE_EMPTY).
            # Wait for status to transition to RUNNING/QUEUED first, then poll for completion.
            echo "Waiting for kernel to start (status != old stale result)..."
            STARTED=false
            for i in $(seq 1 60); do
              RAW=$(check_status)
              if [ $((i % 5)) -eq 0 ]; then
                echo "Startup check $i/60: $RAW"
              fi
              if echo "$RAW" | grep -qiE "RUNNING|QUEUED"; then
                echo "Kernel is now running: $RAW"
                STARTED=true
                break
              fi
              # If status changed to COMPLETE (not EMPTY/ERROR), training finished fast
              if echo "$RAW" | grep -q "^COMPLETE$"; then
                echo "Kernel completed successfully."
                return 0
              fi
              sleep 30
            done

            if [ "$STARTED" = "false" ]; then
              echo "Kernel never started (stuck at stale status). Last: $RAW"
              echo "FAILURE_MSG=Kernel never started after push" >> "$GITHUB_ENV"
              return 1
            fi

            # ASR training can take hours — poll for up to 6 hours
            for i in $(seq 1 720); do
              RAW=$(check_status)
              if [ $((i % 10)) -eq 0 ]; then
                echo "Attempt $i/720: $RAW"
              fi
              # COMPLETE_EMPTY = kernel finished with no output (error)
              if echo "$RAW" | grep -qiE "COMPLETE_EMPTY|ERROR|CANCEL"; then
                echo "Kernel failed: $RAW"
                echo "FAILURE_MSG=$RAW" >> "$GITHUB_ENV"
                return 1
              fi
              if echo "$RAW" | grep -qiE "COMPLETE"; then
                echo "Kernel completed successfully."
                return 0
              fi
              sleep 30
            done
            echo "Timeout: kernel did not complete in 6 hours."
            return 1
          }

          # Check kernel log for GPU allocation failure
          check_no_gpu() {
            mkdir -p /tmp/kernel_log
            kaggle kernels output "$KERNEL_ID" -p /tmp/kernel_log 2>/dev/null || true
            SLUG=$(echo "$KERNEL_ID" | cut -d'/' -f2)
            LOG="/tmp/kernel_log/${SLUG}.log"
            if [ -f "$LOG" ]; then
              python3 -c "
          import json
          entries = json.load(open('$LOG'))
          text = ' '.join(e.get('data','') for e in entries)
          if 'No CUDA GPU detected' in text:
              print('NO_GPU')
          elif 'CUDA out of memory' in text or 'OOM' in text:
              print('OOM')
          else:
              print('OTHER')
          " 2>/dev/null || echo "OTHER"
            else
              echo "NO_LOG"
            fi
            rm -rf /tmp/kernel_log
          }

          # Push and poll with GPU retry (up to 3 attempts)
          push_and_poll() {
            PUSH_OUTPUT=$(kaggle kernels push -p "$NB_DIR" 2>&1) || true
            echo "Push output: $PUSH_OUTPUT"

            # Fatal push errors — abort immediately
            if echo "$PUSH_OUTPUT" | grep -qiE "Notebook not found|Kernel must be specified|Invalid kernel"; then
              echo "ERROR: Push rejected by Kaggle API."
              exit 1
            fi

            # GPU quota/session limit — abort (can't retry)
            if echo "$PUSH_OUTPUT" | grep -qiE "session count.*reached|quota.*reached|GPU quota"; then
              echo "ERROR: GPU quota or session limit reached."
              curl -s -X POST "$DISCORD_WEBHOOK_URL" \
                -H "Content-Type: application/json" \
                -d '{"content": "❌ **GPU枠不足**\nKernel: `'"$KERNEL_ID"'`\nKaggle GPU quota/session limitに達しました。"}' || true
              return 1
            fi

            poll_until_done
          }

          # Record original GPU setting for restoration
          ORIG_GPU=$(python3 -c "import json; print(json.load(open('$METADATA')).get('enable_gpu','false'))")
          echo "ORIG_GPU=$ORIG_GPU" >> "$GITHUB_ENV"
          echo "Original enable_gpu: $ORIG_GPU"

          MAX_GPU_RETRIES=3
          for ATTEMPT in $(seq 1 $MAX_GPU_RETRIES); do
            echo "=== GPU Attempt $ATTEMPT/$MAX_GPU_RETRIES ==="
            wait_for_idle

            if push_and_poll; then
              echo "Success on attempt $ATTEMPT."
              exit 0
            fi

            # Kernel failed — check why
            FAIL_REASON=$(check_no_gpu)
            echo "Failure reason: $FAIL_REASON"

            if [ "$FAIL_REASON" = "NO_GPU" ]; then
              echo "Kaggle allocated CPU instead of GPU. Retrying..."
              curl -s -X POST "$DISCORD_WEBHOOK_URL" \
                -H "Content-Type: application/json" \
                -d '{"content": "⚠️ **GPU未割り当て (attempt '"$ATTEMPT"'/'"$MAX_GPU_RETRIES"')**\nKernel: `'"$KERNEL_ID"'`\nKaggleがCPUで起動。GPUリトライします。"}' || true
              if [ "$ATTEMPT" -lt "$MAX_GPU_RETRIES" ]; then
                echo "Waiting 60s before retry..."
                sleep 60
                continue
              fi
            fi

            # OOM, OTHER, NO_LOG, or final attempt — give up
            echo "GPU failed (reason: $FAIL_REASON). No more retries."
            curl -s -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d '{"content": "❌ **GPU学習失敗**\nKernel: `'"$KERNEL_ID"'`\n理由: '"$FAIL_REASON"'\nAttempt: '"$ATTEMPT"'/'"$MAX_GPU_RETRIES"'"}' || true
            exit 1
          done

          echo "All GPU attempts exhausted."
          exit 1

      - name: Restore GPU setting
        if: always()
        run: |
          METADATA="${{ inputs.competition_dir }}/kernel-metadata.json"
          ORIG_GPU="${{ env.ORIG_GPU }}"
          if [ -n "$ORIG_GPU" ]; then
            python3 -c "
          import json
          with open('$METADATA') as f:
              meta = json.load(f)
          meta['enable_gpu'] = '$ORIG_GPU'
          with open('$METADATA', 'w') as f:
              json.dump(meta, f, indent=2)
          "
          fi

      - name: Show kernel diagnostics on failure
        if: failure()
        run: |
          KERNEL_ID="${{ steps.config.outputs.kernel_id }}"
          SLUG=$(echo "$KERNEL_ID" | cut -d'/' -f2)
          mkdir -p ./kernel_log_out
          kaggle kernels output "$KERNEL_ID" -p ./kernel_log_out || true
          LOG_FILE="./kernel_log_out/${SLUG}.log"
          if [ -f "$LOG_FILE" ]; then
            echo "--- stdout (last 50 lines) ---"
            python3 -c "import json; entries=json.load(open('$LOG_FILE')); lines=[e['data'] for e in entries if e.get('stream_name')=='stdout']; print(''.join(lines[-50:]),end='')" || true
            echo ""
            echo "--- stderr (last 30 lines) ---"
            python3 -c "import json; entries=json.load(open('$LOG_FILE')); errs=[e['data'] for e in entries if e.get('stream_name')=='stderr']; print(''.join(errs[-30:]),end='')" || true
          else
            echo "No log file found."
            ls -la ./kernel_log_out/ || true
          fi

      - name: Download kernel output
        run: |
          KERNEL_ID="${{ steps.config.outputs.kernel_id }}"
          mkdir -p ./kaggle_output
          kaggle kernels output "$KERNEL_ID" -p ./kaggle_output
          echo "Downloaded files:"
          find ./kaggle_output -type f -exec ls -lh {} \;

      - name: Create GitHub Release with model
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ inputs.model_release_tag }}"
          MODEL_TAR=$(find ./kaggle_output -name "model_*.tar.gz" | head -1)

          if [ -z "$MODEL_TAR" ]; then
            echo "ERROR: No model tar.gz found in kernel output"
            find ./kaggle_output -type f
            exit 1
          fi

          SIZE=$(du -h "$MODEL_TAR" | cut -f1)
          echo "Model: $MODEL_TAR ($SIZE)"

          # Delete existing release if any
          gh release delete "$TAG" --yes 2>/dev/null || true

          gh release create "$TAG" "$MODEL_TAR" \
            --title "$TAG" \
            --notes "$(cat <<NOTES
          **${{ inputs.memo }}**

          - Competition: ${{ inputs.competition_dir }}
          - Model: ${{ steps.config.outputs.model_name }}
          - Epochs: ${{ inputs.epochs }}
          - LR: ${{ inputs.learning_rate }}
          - Size: $SIZE
          - Workflow: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          NOTES
          )"

          echo "Release created: $TAG"

      - name: Auto-trigger Package Submission
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "Triggering Package DrivenData Submission..."
          gh workflow run "Package DrivenData Submission" \
            -f competition_dir="${{ inputs.competition_dir }}" \
            -f model_release_tag="${{ inputs.model_release_tag }}" \
            -f memo="${{ inputs.memo }}"
          echo "Package workflow triggered!"

      - name: Sync W&B offline runs
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
        run: |
          WANDB_DIRS=$(find ./kaggle_output -type d -name "offline-run-*" 2>/dev/null)
          if [ -z "$WANDB_DIRS" ]; then
            echo "No W&B offline runs found."
          else
            for dir in $WANDB_DIRS; do
              echo "Syncing: $dir"
              wandb sync "$dir" || true
            done
          fi

      - name: Notify Discord (success)
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"✅ **DrivenData GPU学習完了**\nDir: \`${{ inputs.competition_dir }}\`\nModel: \`${{ inputs.model_release_tag }}\`\nMemo: ${{ inputs.memo }}\n\n次: Package DrivenData Submission を実行\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true

      - name: Notify Discord (failure)
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"❌ **DrivenData GPU学習失敗**\nDir: \`${{ inputs.competition_dir }}\`\nMemo: ${{ inputs.memo }}\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true
